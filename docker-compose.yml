version: '3.8'

services:
  app:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - EMBEDDING_MODEL_URL=${EMBEDDING_MODEL_URL}
      - EMBEDDING_MODEL_API_KEY=${EMBEDDING_MODEL_API_KEY}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-text-embedding-ada-002}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1536}
      - HIGH_RISK_THRESHOLD=${HIGH_RISK_THRESHOLD:-0.85}
      - DATABASE_URL=postgresql+asyncpg://antifraud_user:antifraud_pass@db:5432/antifraud_db
      - API_KEY=${API_KEY:-your-secret-api-key}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:16-pg16
    environment:
      - POSTGRES_USER=antifraud_user
      - POSTGRES_PASSWORD=antifraud_pass
      - POSTGRES_DB=antifraud_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antifraud_user -d antifraud_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
